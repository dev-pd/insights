services:
  nginx:
    image: nginx:alpine
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    env_file: ./backend/.env
    # --concurrency from CELERY_WORKER_CONCURRENCY env (default 4).
    # Time limits are configured on celery_app itself, not the CLI, so they
    # stay one-source-of-truth in app/tasks/celery_app.py.
    # The multi-stage backend Dockerfile drops `uv` from the final image and
    # exposes the venv binaries on PATH, so we call `celery` directly.
    command:
      [
        "sh",
        "-c",
        "celery -A app.tasks worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: ./backend
    env_file: ./backend/.env
    # --schedule writes to /tmp because the non-root app user can't write to
    # WORKDIR (/app). The schedule file only stores last-run timestamps;
    # losing it on container restart at most fires one redundant invocation,
    # acceptable for hourly cache warming.
    command:
      [
        "celery",
        "-A",
        "app.tasks",
        "beat",
        "--loglevel=info",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feedback
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
